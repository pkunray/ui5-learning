# ========================================================================
# i18n Resource Bundle - German (Deutsch)
# ========================================================================
#
# LOCALE-SPECIFIC FILES
# ---------------------
# This file (i18n_de.properties) provides German translations.
# The "_de" suffix tells UI5 this file is for the German locale.
#
# How UI5 resolves the correct file:
#   1. User's browser is set to "de-DE" (German, Germany)
#   2. UI5 looks for: i18n_de_DE.properties  (exact match)
#   3. Not found? Falls back to: i18n_de.properties  (language match) <-- THIS FILE
#   4. Not found? Falls back to: i18n.properties  (default)
#
# This means i18n_de.properties covers ALL German-speaking regions
# (Germany, Austria, Switzerland) unless you create more specific files
# like i18n_de_AT.properties for Austrian German.
#
# IMPORTANT: You don't have to translate EVERY key. If a key is missing
# here, UI5 automatically uses the value from i18n.properties (English).
# This is great for proper nouns or brand names that stay the same.
#
# To test German in your browser:
#   - Add ?sap-language=de to the URL
#   - Or change your browser's language settings to German
# ========================================================================


