# ========================================================================
# i18n Resource Bundle - English (Default)
# ========================================================================
#
# WHAT IS i18n?
# ------------
# "i18n" stands for "internationalization" (i - 18 letters - n).
# It's the practice of designing your app so it can be adapted to
# different languages and regions WITHOUT code changes. In UI5, i18n
# is handled through Java-style resource bundles (.properties files).
#
# HOW RESOURCE BUNDLES WORK IN UI5
# --------------------------------
# 1. You create a default file: i18n.properties (usually English)
# 2. For each additional language, create: i18n_<locale>.properties
#    Examples: i18n_de.properties (German), i18n_fr.properties (French),
#              i18n_zh_CN.properties (Simplified Chinese)
#
# 3. UI5 automatically picks the right file based on:
#    a) The browser's language setting (navigator.language)
#    b) The sap-language URL parameter (?sap-language=de)
#    c) The sap-ui-language configuration in bootstrapping
#
# 4. If a key is missing in a locale-specific file, UI5 falls back
#    to the default i18n.properties file. This is called the
#    "fallback chain": i18n_de_AT.properties -> i18n_de.properties -> i18n.properties
#
# HOW TO USE IN YOUR APP
# ----------------------
# In manifest.json, declare the resource bundle model:
#   "models": {
#     "i18n": {
#       "type": "sap.ui.model.resource.ResourceModel",
#       "settings": { "bundleName": "com.shopeasy.app.i18n.i18n" }
#     }
#   }
#
# Then use it in XML views with the i18n model:
#   <Text text="{i18n>appTitle}" />
#
# In controllers (JavaScript):
#   var oBundle = this.getView().getModel("i18n").getResourceBundle();
#   var sText = oBundle.getText("appTitle");
#
# PLACEHOLDERS
# ------------
# Use {0}, {1}, {2}... for dynamic values. They get replaced at runtime.
# Example: lowStock=Low Stock ({0} left)
# Usage:   oBundle.getText("lowStock", [5])  =>  "Low Stock (5 left)"
#
# Placeholders are positional, so {0} is the first argument, {1} is the
# second, and so on. This lets translators reorder them for grammar:
#   English: "{0} added to cart"        -> '"Laptop" added to cart'
#   German:  '"{0}" zum Warenkorb hinzugefügt'
#
# NAMING CONVENTIONS
# ------------------
# - Use camelCase for keys: appTitle, homeSubtitle, addToCart
# - Group related keys with a common prefix: cart*, product*, order*
# - Use descriptive names that hint at where the text is used
# - Avoid generic names like "label1", "text2" — they're unmaintainable
# - For button labels, use verb forms: addToCart, placeOrder, continueShopping
# - For titles/headers, use noun forms: appTitle, productsTitle
#
# IMPORTANT NOTES
# ---------------
# - .properties files use ISO 8859-1 encoding by default, but UI5 reads
#   them as UTF-8. Special characters work fine in modern UI5.
# - Lines starting with # or ! are comments
# - Use \ at end of line for multi-line values
# - Empty lines are ignored
# - Keys are case-sensitive: appTitle != AppTitle != APPTITLE
# ========================================================================


# --------------------------------------------------
# Application-level texts
# These appear in the shell, browser title, etc.
# --------------------------------------------------
appTitle=ShopEasy
appDescription=Your one-stop online shop

# --------------------------------------------------
# Home / Landing page
# --------------------------------------------------
homeTitle=Welcome to ShopEasy
homeSubtitle=Discover amazing products at great prices

# --------------------------------------------------
# Page titles
# Used in the <Page title="..."> or navigation headers
# --------------------------------------------------
productsTitle=Products
productDetailsTitle=Product Details
cartTitle=Shopping Cart
checkoutTitle=Checkout

# --------------------------------------------------
# Action buttons
# Verbs or short phrases describing what happens on click
# --------------------------------------------------
addToCart=Add to Cart
removeFromCart=Remove
buyNow=Buy Now

# --------------------------------------------------
# Product attributes / labels
# Used as column headers, form labels, etc.
# --------------------------------------------------
quantity=Quantity
price=Price
total=Total
category=Category

# --------------------------------------------------
# Search and filtering
# Placeholders and labels for the toolbar area
# --------------------------------------------------

# The "..." in the search text serves as a visual hint
# that the user should type something (like HTML placeholder attr)
search=Search products...
filterBy=Filter by
sortBy=Sort by

# --------------------------------------------------
# Empty states / no data
# These messages appear when there's nothing to display.
# Good UX practice: always tell users WHY the screen is empty
# and WHAT they can do about it.
# --------------------------------------------------
noProducts=No products found
emptyCart=Your cart is empty
emptyCartMessage=Start shopping to add items to your cart
continueShopping=Continue Shopping

# --------------------------------------------------
# Cart and checkout flow
# --------------------------------------------------
proceedToCheckout=Proceed to Checkout
orderSummary=Order Summary
shippingAddress=Shipping Address
paymentMethod=Payment Method
placeOrder=Place Order

# --------------------------------------------------
# Order confirmation
# Shown after a successful purchase
# --------------------------------------------------
orderConfirmation=Order Confirmed!
orderConfirmationMsg=Thank you for your purchase!

# --------------------------------------------------
# Customer / shipping form fields
# These are used as labels in the checkout form
# --------------------------------------------------
firstName=First Name
lastName=Last Name
email=Email
phone=Phone
address=Address
city=City
zipCode=ZIP Code
country=Country

# --------------------------------------------------
# Stock / availability indicators
# {0} is a placeholder — see "PLACEHOLDERS" section above
# --------------------------------------------------
inStock=In Stock

# {0} = number of items remaining. Example: "Low Stock (3 left)"
lowStock=Low Stock ({0} left)

outOfStock=Out of Stock

# --------------------------------------------------
# Dynamic messages with placeholders
# --------------------------------------------------

# {0} = product name. Quotes around {0} are literal characters
# displayed to the user.  Example: '"Wireless Mouse" added to cart'
itemAdded="{0}" added to cart

itemRemoved=Item removed from cart

# {0} = number of items in cart. Example: "Cart (3)"
cartItemCount=Cart ({0})

# --------------------------------------------------
# Product detail sections
# --------------------------------------------------

# {0} = number of reviews. Example: "Reviews (42)"
reviews=Reviews ({0})

rating=Rating
description=Description
specifications=Specifications
