<!DOCTYPE html>
<!--
============================================================================
FILE: testsuite.qunit.html — Test Suite Entry Point
PROJECT: ShopEasy - SAP UI5 Online Shopping Application
NAMESPACE: com.shopeasy.app
============================================================================

[BEGINNER] WHAT IS THIS FILE?
─────────────────────────────
This is the TEST SUITE LANDING PAGE. It acts as a simple index that links
to all the different test pages in your application. When a developer
(or CI/CD pipeline) wants to run tests, they open THIS page first and
choose which test category to run.

[BEGINNER] WHY HAVE A CENTRAL PAGE?
────────────────────────────────────
In a real project, you may have dozens of test files organized into:
  - Unit Tests:        Fast, isolated tests for individual functions/modules.
  - Integration Tests: Slower tests that check how multiple modules interact.
  - End-to-End Tests:  Full user-journey simulations (OPA5 in UI5 world).

Having a single entry point makes it easy to find and run everything.

[INTERMEDIATE] CI/CD INTEGRATION
In production projects, your CI server (Jenkins, GitHub Actions, Azure
Pipelines) would open the unit test and integration test pages in a
headless browser (like Puppeteer or Karma) and report pass/fail status.

[BEST PRACTICE] Keep this page simple — it's just links. The actual
test bootstrapping and execution happens in the individual test runner pages.
============================================================================
-->
<html>
<head>
	<meta charset="utf-8">
	<title>ShopEasy — Test Suite</title>

	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			max-width: 700px;
			margin: 40px auto;
			padding: 20px;
			color: #333;
		}
		h1 {
			border-bottom: 2px solid #0854a0;
			padding-bottom: 10px;
		}
		h2 {
			color: #0854a0;
		}
		ul {
			list-style: none;
			padding: 0;
		}
		li {
			margin: 10px 0;
		}
		a {
			color: #0854a0;
			text-decoration: none;
			font-size: 1.1em;
			padding: 8px 12px;
			display: inline-block;
			border: 1px solid #0854a0;
			border-radius: 4px;
			transition: background-color 0.2s;
		}
		a:hover {
			background-color: #0854a0;
			color: #fff;
		}
		p.description {
			color: #666;
			margin-top: 2px;
			margin-left: 12px;
			font-size: 0.9em;
		}
	</style>
</head>
<body>
	<h1>ShopEasy Test Suite</h1>
	<p>Select a test category to run:</p>

	<!-- ================================================================
	     [BEGINNER] UNIT TESTS
	     ================================================================
	     Unit tests verify individual functions in isolation. They are:
	       - FAST (milliseconds per test)
	       - INDEPENDENT (no UI, no server, no DOM interaction)
	       - DETERMINISTIC (same input always gives same output)

	     Examples: testing that formatPrice(42.5) returns "$42.50"
	     ================================================================ -->
	<h2>Unit Tests</h2>
	<ul>
		<li>
			<a href="unit/unitTests.qunit.html">Run Unit Tests</a>
			<p class="description">
				Tests for formatters, models, and other pure logic modules.
			</p>
		</li>
	</ul>

	<!-- ================================================================
	     [BEGINNER] INTEGRATION / OPA5 TESTS
	     ================================================================
	     Integration tests (using OPA5) simulate real user interactions:
	       - Navigate between pages
	       - Click buttons, type in search fields
	       - Verify that the correct views and data appear

	     These are slower but give confidence that the app works as a whole.
	     ================================================================ -->
	<h2>Integration Tests (OPA5)</h2>
	<ul>
		<li>
			<a href="integration/opaTests.qunit.html">Run OPA5 Integration Tests</a>
			<p class="description">
				End-to-end user journey tests: navigation, shopping flow, cart operations.
			</p>
		</li>
	</ul>
</body>
</html>
